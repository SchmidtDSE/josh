name: Build
on: [push]

jobs:
  buildSpec:
    environment: Build
    runs-on: ubuntu-latest
    name: Build Paper
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update apt
        run: sudo apt-get update
      - name: Install LaTeX
        run: sudo apt-get install texlive-extra-utils texlive-fonts-recommended texlive-latex-base texlive-latex-extra
      - name: Get Pandoc
        run: wget https://github.com/jgm/pandoc/releases/download/3.1.10/pandoc-3.1.10-1-amd64.deb
      - name: Install Pandoc
        run: sudo dpkg -i pandoc-3.1.10-1-amd64.deb
      - name: Build paper
        run: pandoc -o spec.pdf --number-sections LanguageSpecification.md
      - name: Upload paper
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: spec
          path: spec.pdf
  buildJava:
    environment: Build
    runs-on: ubuntu-latest
    name: Build Fat Jar
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build fat jar
        run: ./gradlew fatJar
      - name: Upload jar
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fatJar
          path: build/libs/joshsim-fat.jar
  checkJava:
    needs: buildJava
    environment: Build
    runs-on: ubuntu-latest
    name: Static Checks
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Check grammar
        run: ./gradlew generateGrammarSource
      - name: Check main style
        run: ./gradlew checkstyleMain
      - name: Check test style
        run: ./gradlew checkstyleTest
  testJava:
    needs: buildJava
    environment: Build
    runs-on: ubuntu-latest
    name: Test Java
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update apt
        run: sudo apt-get update
      - name: Setup netCDF
        run: sudo apt-get install -y libnetcdf-dev
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run tests
        run: ./gradlew test
  testPreprocessing:
    needs: buildJava
    environment: Build
    runs-on: ubuntu-latest
    name: Test Preprocessing and Create Tutorial Data
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Update apt
        run: sudo apt-get update
      - name: Setup netCDF
        run: sudo apt-get install -y libnetcdf-dev
      - name: Download fat jar
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Setup environment
        run: |
          mkdir -p build/libs
          mv joshsim-fat.jar build/libs/
          chmod +x examples/test_basic_preprocess.sh
          chmod +x examples/test_spatial_preprocess.sh
          chmod +x landing/test_preprocess.sh
      - name: Run basic preprocessing tests
        run: bash examples/test_basic_preprocess.sh
      - name: Run spatial preprocessing tests
        run: bash examples/test_spatial_preprocess.sh
      - name: Run temporal preprocessing and create tutorial data
        run: bash landing/test_preprocess.sh
      - name: Upload preprocessed tutorial data
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: preprocessed-tutorial-data
          path: landing/preprocessed_data/
  validateExamples:
    needs: buildJava
    environment: Build
    runs-on: ubuntu-latest
    name: Validate Josh examples
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Validate examples
        run: bash examples/validate.sh
  testRemote:
    needs: [buildJava]
    environment: Build
    runs-on: ubuntu-latest
    name: Test Remote
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Download fat jar
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Start local server
        run: java -Xmx2g -jar build/libs/joshsim-fat.jar server > /tmp/josh_server.log 2>&1 &
      - name: Wait for server ready
        run: bash .github/scripts/wait_for_server.sh /tmp/josh_server.log
      - name: Run remote simulation and check step labeling
        run: bash .github/scripts/run_remote_step_check.sh
      - name: Test profiler on remote (client --enable-profiler, expect non-zero timings)
        run: bash .github/scripts/run_profiler_remote.sh on --enable-profiler
      - name: Test profiler mismatch remote (client --enable-profiler, server honors field, expect non-zero timings)
        run: bash .github/scripts/run_profiler_remote.sh on --enable-profiler
      - name: Stop server before profiler server
        run: pkill -f joshsim-fat.jar || true
      - name: Start profiler server
        run: java -Xmx2g -jar build/libs/joshsim-fat.jar server --enable-profiler > /tmp/josh_profiler_server.log 2>&1 &
      - name: Wait for profiler server ready
        run: bash .github/scripts/wait_for_server.sh /tmp/josh_profiler_server.log
      - name: Test server-global profiler flag (client without --enable-profiler)
        run: bash .github/scripts/run_profiler_remote.sh on
      - name: Stop server
        if: always()
        run: pkill -f joshsim-fat.jar || true
  testOutputFormatCSV:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test CSV Output Format
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Test CSV output
        run: bash .github/scripts/test_csv_output.sh
  testOutputFormatNetCDF:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test NetCDF Output Format
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Update apt
        run: sudo apt-get update
      - name: Setup netCDF
        run: sudo apt-get install -y libnetcdf-dev
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Test netCDF output
        run: bash .github/scripts/test_netcdf_output.sh
  testOutputFormatGeoTIFF:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test GeoTIFF Output Format
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Test geotiff output
        run: bash .github/scripts/test_geotiff_output.sh
  testGuideExamples:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test Guide Examples
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Update apt
        run: sudo apt-get update
      - name: Setup netCDF
        run: sudo apt-get install -y libnetcdf-dev
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Download preprocessed tutorial data
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: preprocessed-tutorial-data
          path: ./landing/preprocessed_data/
      - name: Test guide examples
        run: bash examples/test_guide_examples.sh
  testConfiguration:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test Configuration Features
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Test configuration
        run: bash examples/test_config.sh
  testAdditionalFeatures:
    needs: [validateExamples, testPreprocessing]
    environment: Build
    runs-on: ubuntu-latest
    name: Test Additional Features
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Update apt
        run: sudo apt-get update
      - name: Setup netCDF
        run: sudo apt-get install -y libnetcdf-dev
      - name: Download farJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Move artifact
        run: mkdir -p build/libs; mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Download preprocessed tutorial data
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: preprocessed-tutorial-data
          path: ./landing/preprocessed_data/
      - name: Test external data with --data option
        run: bash examples/test_data_option.sh
      - name: Test job configuration template functionality
        run: bash examples/test_job_config.sh
      - name: Test profiler off local (expect zero timings)
        run: bash .github/scripts/run_profiler_local.sh 1 off
      - name: Test profiler on local (expect non-zero timings)
        run: bash .github/scripts/run_profiler_local.sh 1 on --enable-profiler
      - name: Test profiler on local with 5 replicates (expect non-zero timings)
        run: bash .github/scripts/run_profiler_local.sh 5 on --enable-profiler
  buildWeb:
    environment: Build
    needs: [ checkJava, buildJava, testJava, validateExamples, testRemote, testOutputFormatCSV, testOutputFormatNetCDF, testOutputFormatGeoTIFF, testGuideExamples, testConfiguration, testAdditionalFeatures, testPreprocessing ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    name: Build for Browser
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build war
        run: ./gradlew war
      - name: Update apt
        run: sudo apt-get update
      - name: Install wget
        run: sudo apt-get install -y wget
      - name: Load JS deps
        run: cd editor/third_party; bash install_deps.sh
      - name: Install landing deps
        run: cd landing; bash install_deps.sh
      - name: Optimize publicsans deployment
        run: |
          # Optimize landing fonts
          cd landing
          if [ -d "publicsans/fonts/otf" ]; then
            mkdir -p publicsans-minimal/fonts/otf
            cp publicsans/fonts/otf/PublicSans-Regular.otf publicsans-minimal/fonts/otf/
            rm -rf publicsans
            mv publicsans-minimal publicsans
          fi
          cd ..
          # Optimize editor fonts
          cd editor/third_party
          if [ -d "publicsans/fonts/otf" ]; then
            mkdir -p publicsans-minimal/fonts/otf
            cp publicsans/fonts/otf/PublicSans-Regular.otf publicsans-minimal/fonts/otf/
            rm -rf publicsans
            mv publicsans-minimal publicsans
          fi
      - name: Copy guide examples to landing
        run: |
          mkdir -p landing/examples/guide
          cp examples/guide/hello.josh landing/examples/guide/
          cp examples/guide/grass_shrub_fire.josh landing/examples/guide/
          cp examples/guide/two_trees.josh landing/examples/guide/
      - name: Upload war
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: war
          path: build/libs/JoshSim.war
      - name: Embed war
        run: bash editor/war/get_from_jar.sh
      - name: Build fat jar
        run: ./gradlew fatJar
      - name: Upload full jar
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fullJar
          path: build/libs/joshsim-fat.jar
      - name: Upload editor
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: editor
          path: editor
      - name: Upload landing
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: landing
          path: landing
  deployStatic:
    environment: Deploy
    runs-on: ubuntu-latest
    name: Deploy to SFTP
    needs: [buildWeb, testPreprocessing]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Set environment variables based on branch
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "EDITOR_DIRECTORY=editor.joshsim.org" >> $GITHUB_ENV
            echo "LANDING_DIRECTORY=joshsim.org" >> $GITHUB_ENV
            echo "Deploying to production environment"
          else
            echo "EDITOR_DIRECTORY=editor.joshsim.org/dev" >> $GITHUB_ENV
            echo "LANDING_DIRECTORY=joshsim.org/dev" >> $GITHUB_ENV
            echo "Deploying to directory environment"
          fi
      - name: Set branch name
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
      - name: Download fatJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fullJar
          path: ./deploy
      - name: Download WAR artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: war
          path: ./deploy/war
      - name: Download preprocessed tutorial data
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: preprocessed-tutorial-data
          path: ./tutorial-data-temp
      - name: Install SSH client and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass
      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 22 ${{ secrets.SFTPHOST }} >> ~/.ssh/known_hosts
      - name: Upload Jar via SCP
        env:
          SSHPASS: ${{ secrets.SFTPPASSWORD }}
        run: |
          sshpass -e scp -r -P 22 -o StrictHostKeyChecking=no \
            ./deploy/* \
            ${{ secrets.SFTPUSER }}@${{ secrets.SFTPHOST }}:./joshsim.org/dist/${{ steps.branch.outputs.name }}/
      - name: Download editor
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: editor
          path: ./editor-build
      - name: Checkout for llms.txt
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ./repo
      - name: Copy documentation files to editor
        run: |
          cp ./repo/llms.txt ./editor-build/
          cp ./repo/llms-full.txt ./editor-build/
          cp -r ./repo/docs ./editor-build/docs
      - name: Upload Editor via SCP
        env:
          SSHPASS: ${{ secrets.SFTPPASSWORD }}
        run: |
          sshpass -e scp -r -P 22 -o StrictHostKeyChecking=no \
            ./editor-build/* \
            ${{ secrets.SFTPUSER }}@${{ secrets.SFTPHOST }}:${{ env.EDITOR_DIRECTORY }}/
      - name: Download landing
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: landing
          path: ./landing-build
      - name: Copy documentation files to landing
        run: |
          cp ./repo/llms.txt ./landing-build/
          cp ./repo/llms-full.txt ./landing-build/
          cp -r ./repo/docs ./landing-build/docs
      - name: Organize tutorial data for guides
        run: |
          mkdir -p ./landing-build/guides/two_trees
          mkdir -p ./landing-build/guides/grass_shrub_fire
          cp ./tutorial-data-temp/temperatureTulare.jshd ./landing-build/guides/two_trees/
          cp ./tutorial-data-temp/precipitationTulare.jshd ./landing-build/guides/two_trees/
          cp ./tutorial-data-temp/precipitation_geotiff.jshd ./landing-build/guides/grass_shrub_fire/precipitation.jshd
      - name: Remove publicsans directory before upload
        run: |
          if [ -d "./landing-build/publicsans" ]; then
            rm -rf ./landing-build/publicsans
            echo "Removed publicsans directory from landing-build"
          fi
      - name: Upload landing via SCP
        env:
          SSHPASS: ${{ secrets.SFTPPASSWORD }}
        run: |
          sshpass -e scp -r -P 22 -o StrictHostKeyChecking=no \
            ./landing-build/* \
            ${{ secrets.SFTPUSER }}@${{ secrets.SFTPHOST }}:${{ env.LANDING_DIRECTORY }}/
  deployCloud:
    name: Deploy to Cloud
    environment: Deploy
    runs-on: ubuntu-latest
    needs: [buildWeb]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Set environment variables based on branch
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "SERVICE_NAME=josh-executor-prod" >> $GITHUB_ENV
            echo "DOCKERFILE=Dockerfile.prod" >> $GITHUB_ENV
            echo "Deploying to Production environment"
          else
            echo "SERVICE_NAME=josh-executor-dev" >> $GITHUB_ENV
            echo "DOCKERFILE=Dockerfile.dev" >> $GITHUB_ENV
            echo "Deploying to Development environment"
          fi
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Download fatJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fullJar
          path: ./cloud-img
      - name: Configure Docker
        run: gcloud auth configure-docker us-west1-docker.pkg.dev
      - name: Build and Push Docker image
        run: |
          # Build from the directory containing the Dockerfile
          docker build -t us-west1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/docker-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} -f cloud-img/${{ env.DOCKERFILE }} cloud-img
          docker push us-west1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/docker-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ secrets.REGION }} \
            --image=us-west1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/docker-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --memory=16Gi \
            --cpu=6 \
            --min-instances=0 \
            --max-instances=100 \
            --port=8085 \
            --allow-unauthenticated \
            --set-secrets="JOSH_API_KEYS=${{ secrets.SECRET_NAME }}" \
            --use-http2 \
            --concurrency=1 \
            --timeout=3600s
  buildBatchImage:
    name: Build Batch Worker Image
    environment: Build
    runs-on: ubuntu-latest
    needs: [ checkJava, testJava, buildJava ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feat/k8s-batch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download fatJar artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: fatJar
      - name: Stage fat jar for Docker build
        run: |
          mkdir -p build/libs
          mv joshsim-fat.jar build/libs/joshsim-fat.jar
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push batch worker image
        run: |
          IMAGE=ghcr.io/schmidtdse/josh/joshsim-batch
          docker build -f cloud-img/Dockerfile.batch \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
