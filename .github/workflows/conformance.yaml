name: Conformance Tests

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  conformance:
    runs-on: ubuntu-latest
    name: Run Conformance Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup netCDF
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev

      - name: Build fat jar
        run: ./gradlew fatJar

      - name: Run conformance tests
        id: conformance
        continue-on-error: true
        run: ./gradlew conformanceTest

      - name: Parse test results
        if: always()
        id: parse
        run: |
          # Parse JUnit XML results
          RESULTS_DIR="build/test-results/conformanceTest"

          if [ ! -d "$RESULTS_DIR" ]; then
            echo "No test results found"
            echo "summary=No test results found" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count test results from XML files
          PASSED=0
          FAILED=0
          SKIPPED=0
          FAILURES=""

          for xml in "$RESULTS_DIR"/*.xml; do
            if [ -f "$xml" ]; then
              # Extract counts from XML
              FILE_TESTS=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")
              FILE_FAILURES=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")
              FILE_ERRORS=$(grep -o 'errors="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")
              FILE_SKIPPED=$(grep -o 'skipped="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")

              FILE_FAILED=$((FILE_FAILURES + FILE_ERRORS))
              FILE_PASSED=$((FILE_TESTS - FILE_FAILED - FILE_SKIPPED))

              PASSED=$((PASSED + FILE_PASSED))
              FAILED=$((FAILED + FILE_FAILED))
              SKIPPED=$((SKIPPED + FILE_SKIPPED))

              # Extract failure details
              if [ "$FILE_FAILED" -gt 0 ]; then
                # Get test names that failed
                FAILED_TESTS=$(grep -oP 'testcase name="\K[^"]+' "$xml" | while read test; do
                  if grep -q "testcase name=\"$test\"" "$xml" && grep -A1 "testcase name=\"$test\"" "$xml" | grep -q "<failure\|<error"; then
                    echo "$test"
                  fi
                done)
                if [ -n "$FAILED_TESTS" ]; then
                  FAILURES="$FAILURES$FAILED_TESTS"$'\n'
                fi
              fi
            fi
          done

          TOTAL=$((PASSED + FAILED + SKIPPED))

          if [ "$TOTAL" -eq 0 ]; then
            echo "summary=No tests executed" >> $GITHUB_OUTPUT
            exit 0
          fi

          PASS_RATE=$(echo "scale=1; $PASSED * 100 / $TOTAL" | bc)

          # Create summary
          SUMMARY="**Conformance Tests:** $PASSED/$TOTAL passing ($PASS_RATE%)"
          if [ "$FAILED" -gt 0 ]; then
            SUMMARY="$SUMMARY | $FAILED failing"
          fi
          if [ "$SKIPPED" -gt 0 ]; then
            SUMMARY="$SUMMARY | $SKIPPED skipped"
          fi

          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT

      - name: Generate failure report
        if: always()
        run: |
          RESULTS_DIR="build/test-results/conformanceTest"
          REPORT_FILE="conformance-report.md"

          echo "# Conformance Test Report" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "**Run:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$REPORT_FILE"
          echo "**Branch:** ${{ github.head_ref || github.ref_name }}" >> "$REPORT_FILE"
          echo "**Commit:** ${{ github.sha }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          if [ ! -d "$RESULTS_DIR" ]; then
            echo "No test results directory found." >> "$REPORT_FILE"
            cat "$REPORT_FILE"
            exit 0
          fi

          # Parse results
          echo "## Summary" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          PASSED=0
          FAILED=0
          TOTAL=0

          for xml in "$RESULTS_DIR"/*.xml; do
            if [ -f "$xml" ]; then
              FILE_TESTS=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")
              FILE_FAILURES=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")
              FILE_ERRORS=$(grep -o 'errors="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*' || echo "0")

              FILE_FAILED=$((FILE_FAILURES + FILE_ERRORS))
              FILE_PASSED=$((FILE_TESTS - FILE_FAILED))

              PASSED=$((PASSED + FILE_PASSED))
              FAILED=$((FAILED + FILE_FAILED))
              TOTAL=$((TOTAL + FILE_TESTS))
            fi
          done

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSED * 100 / $TOTAL" | bc)
            echo "| Metric | Value |" >> "$REPORT_FILE"
            echo "|--------|-------|" >> "$REPORT_FILE"
            echo "| Total Tests | $TOTAL |" >> "$REPORT_FILE"
            echo "| Passing | $PASSED ($PASS_RATE%) |" >> "$REPORT_FILE"
            echo "| Failing | $FAILED |" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

          # List failures if any
          if [ "$FAILED" -gt 0 ]; then
            echo "## Failing Tests" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"

            for xml in "$RESULTS_DIR"/*.xml; do
              if [ -f "$xml" ]; then
                # Extract failed test names and their output
                python3 - "$xml" >> "$REPORT_FILE" << 'PYEOF'
import xml.etree.ElementTree as ET
import sys

xml_path = sys.argv[1]
try:
    tree = ET.parse(xml_path)
    root = tree.getroot()
    for testcase in root.findall('.//testcase'):
        failure = testcase.find('failure')
        error = testcase.find('error')
        if failure is not None or error is not None:
            name = testcase.get('name', 'unknown')
            print(f"### `{name}`")
            print()
            elem = failure if failure is not None else error
            message = elem.get('message', '')
            text = elem.text or ''
            if message:
                print(f"**Error:** {message}")
                print()
            if text.strip():
                print("```")
                print(text.strip()[:2000])
                print("```")
            print()
except Exception as e:
    pass
PYEOF
              fi
            done
          fi

          # Output report
          cat "$REPORT_FILE"

      - name: Create job summary
        if: always()
        run: |
          echo "## Conformance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.parse.outputs.summary || 'No results available' }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-test-results
          path: |
            build/test-results/conformanceTest/
            build/reports/tests/conformanceTest/
            conformance-report.md
          retention-days: 30
